<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Building Confidence — LimeChain CFO 90-Day Plan</title></head>
<body style="margin:0">
  <div data-document-role="page" data-label="Building Confidence" data-speaker-notes="I have treated the brief as one connected operating problem, not a set of separate finance tasks. The answer is deliberately practical: what I would do in the first 90 days, what I would not overpromise, and what I would need from leadership." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-01.png" alt="Building Confidence" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Five working assumptions" data-speaker-notes="The first assumption is the only one that changes the sequencing. If the burn rate is materially different, I would recalibrate the urgency, but not the logic." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-02.png" alt="Five working assumptions" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="The forecast is not noisy. It is biased." data-speaker-notes="I am not criticising the team. I am saying the model is missing known operating facts. That is much easier to fix than random unpredictability." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-03.png" alt="The forecast is not noisy. It is biased." style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Every ask in the brief is a break in one pipeline" data-speaker-notes="This is the key interpretation. If the board remembers one slide, it should be this one. Data accuracy, collections, forecasting, the KPI question and the fixed-price shift are five breaks in one revenue-to-cash spine." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-04.png" alt="Every ask in the brief is a break in one pipeline" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Three journeys, one order" data-speaker-notes="I would not try to fix everything at once. I would run workstreams in parallel, but the decision order is cash, truth, then discipline. Forecasting is not a phase; it is the output when collections behave and the data is trusted." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-05.png" alt="Three journeys, one order" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Stop the bleeding, see the truth" data-speaker-notes="This is designed to be credible. It is about cadence, ownership and visibility, not buying software. Nothing on this slide needs a hire, a system or a budget." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-06.png" alt="Stop the bleeding, see the truth" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="€1.8m owed to us: five problems, five plays" data-speaker-notes="The point is not to collect everything. The point is to stop treating aged receivables as one number and start managing them as decisions." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-07.png" alt="€1.8m owed to us: five problems, five plays" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="One version of the truth" data-speaker-notes="A dashboard does not create truth. Definitions create truth. The scorecard is only useful if every number has an owner and a contract. Cash numbers first, delivery second, commercial third." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-08.png" alt="One version of the truth" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="What fixed-price actually changes" data-speaker-notes="I would not frame fixed-price as a finance objection. It is commercially attractive. But it needs guardrails or the downside lands in margin. A 30% deposit on a €300k deal is €90k in the bank before an hour is worked." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-09.png" alt="What fixed-price actually changes" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="The ambition is right. The sequencing is the risk." data-speaker-notes="I would show support for the commercial ambition, but I would insist on sequencing. Fixed-price without trusted delivery economics is not strategy; it is risk transfer to the company. The gate is not a brake — it is what makes 40–50% fixed-price possible without making it fatal." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-10.png" alt="The ambition is right. The sequencing is the risk." style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Same project, new regime: Cygnus replayed" data-speaker-notes="This slide makes the control practical. The value is not perfection. The value is finding the problem while there is still time to act. The tripwire does not stop estimates being wrong; it stops wrong estimates staying invisible." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-11.png" alt="Same project, new regime: Cygnus replayed" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="What I commit to, and what I refuse to promise" data-speaker-notes="This is the credibility slide. It shows ambition without overpromising. I commit to artefacts, not outcomes I do not control. I cannot promise that a client pays; I can promise the decision about that client is made and executed." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-12.png" alt="What I commit to, and what I refuse to promise" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Three asks. None of them is budget." data-speaker-notes="This makes the board part of the solution without asking for budget. That is powerful. Give me those three and by day 90 confidence stops being a word on a slide." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-13.png" alt="Three asks. None of them is budget." style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="The 13-week cash view: why weeks matter" data-speaker-notes="This appendix is useful if they push on the cash logic. It keeps the conversation focused on timing, runway and decision rights. This chart is not a problem solved; it is a countdown converted into a plan." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-14.png" alt="The 13-week cash view: why weeks matter" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
