<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Building Confidence — LimeChain CFO 90-Day Plan</title></head>
<body style="margin:0">
  <div data-document-role="page" data-label="Building Confidence" data-speaker-notes="Open with the fused line: not three finance problems, one problem. Leadership can no longer trust its own numbers. Evidence: six forecast misses in a row, all in the same direction. The answer runs in one order: cash first, truth second, discipline third. Five asks in the brief, one underlying problem, three commitments by day 90. Deliberately practical: what I would do in the first 90 days, what I would not overpromise, and what I would need from leadership." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-01.png" alt="Building Confidence" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Five working assumptions" data-speaker-notes="Thirty seconds only. Read at leisure; the one that matters is number one: €1.95M cash, roughly €850k monthly consumption. That makes this a ten week picture, not a directional runway conversation. Detail behind the others: collection odds fall with age (0 to 30 days roughly 95%, 31 to 60 roughly 85%, 61 to 90 roughly 70%, past 90 roughly 40%). All USDC and token balances marked once a day at 16:00 CET, one timestamp, no debates. No new funding arrives inside the window, so the plan works on the cash we have. Finance stays at four people; nothing here needs a hire before day 90." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-02.png" alt="Five working assumptions" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="The forecast is not noisy. It is biased." data-speaker-notes="The memorable concept for a non finance room: bias versus noise. Random error goes both ways. Six misses in the same direction, getting worse, mean the model is blind to things we already know: vendor bills, bonus timing, how clients actually pay, how delivery data reaches finance. Four of the five close note excuses are known, recurring and modelable. I am not criticising the team; the model is missing known operating facts. That is why this is good news: bias is fixable in weeks, noise is not." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-03.png" alt="The forecast is not noisy. It is biased." style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Every ask in the brief is a break in one pipeline" data-speaker-notes="If the board remembers one slide, it is this one. Point at the red marks left to right. Data accuracy, collections, forecasting, the KPI question and the fixed price shift are not five projects; they are five breaks in one revenue to cash spine. The fix travels the same direction: trustworthy hours make utilisation real, utilisation makes margins real, enforced invoicing makes receivables predictable, predictable receivables make the forecast believable. Fix the spine once, then hang quick wins from it. That is exactly what the brief asked for: weave, do not bolt." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-04.png" alt="Every ask in the brief is a break in one pipeline" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Three journeys, one order" data-speaker-notes="I would not fix everything at once. Decision order: cash, truth, discipline. Three lanes run in parallel underneath: people (diagnosis interviews, the weekly Cash Council, one named owner per KPI and account), processes (forecast cadence, collection plays, change orders, the readiness gate, weekly margin reviews) and platforms and data (KPI dictionary, single sources of truth, one crypto timestamp, Scorecard v2, the margin tripwire). The first 30 days in detail: a 13 week cash view live by day 10, the weekly Cash Council from day 12, receivables split into five owned groups by day 15, the crypto conversion and timestamp rule by day 20, and a listening tour of every PM and delivery lead by day 25. None of it needs a hire, a system or a budget. Say the line: a forecast model nobody owns is just a spreadsheet." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-05.png" alt="Three journeys, one order" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="Five problems, five plays" data-speaker-notes="The line: €1.8M outstanding is not one collections problem, it is five different problems wearing the same trench coat. The plays, by group. Disputes past 90 days: settle or escalate, decided in 30 days; a fast haircut beats a receivable losing value weekly. Slow payers 61 to 90: a reminder ladder with real teeth; work pauses at day 45 overdue where the contract allows. DAO and crypto clients: not late, a payment mechanism mismatch; fix the contract with deposits or escrow. Watch list 31 to 60: early intervention, the scope creep conversation happens now. Healthy 0 to 30: do nothing; never annoy the clients who pay on time. €790k sits beyond 60 days, roughly one month of company life. Collecting half buys about two weeks of runway." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-06.png" alt="Five problems, five plays" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="One version of the truth" data-speaker-notes="A dashboard does not create truth; definitions do. Each number gets a contract: definition, formula, source system, owner, update rhythm. One page per KPI, smaller than today's scorecard, and trusted. Three moves behind this: the scorecard contracts, the utilisation summit (finance and delivery in one room, the formula settled, written down and signed, the argument ends on a date) and forecast v2 with the four known blind spots added: vendor bills, bonus timing, real payment behaviour, crypto timestamps. Forecast accuracy itself becomes a tracked number; target within plus or minus 8% for two consecutive months. Order follows risk: cash first, delivery second because it opens the fixed price gate, commercial third." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-07.png" alt="One version of the truth" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="The ambition is right. The sequencing is the risk." data-speaker-notes="Reframe fixed price as estimation variance, not bad pricing. The four projects so far tell one story: when it works it beats the estimate slightly, when it slips it slips hard. Beacon and Delta beat estimate; Apollo and Cygnus lost more than 20 points. The tripwire in action, Cygnus replayed: week 1 OK, week 2 OK, week 3 ALERT and escalation to the Cash Council, week 4 a signed change order worth €38k. What actually happened: 8% margin at close, found at the end, written off. The alarm rings 14 weeks earlier. And the commercial upside: a 30% deposit on a €300k deal is €90k in the bank before an hour is worked. The gate is not a brake; it is what makes 40 to 50% fixed price possible instead of fatal." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-08.png" alt="The ambition is right. The sequencing is the risk." style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="What I commit to, and what I refuse to promise" data-speaker-notes="The credibility slide. The refuse column is the anti overpromise insurance; it reads as maturity because most candidates only promise. Live by day 90: the 13 week cash view updated weekly with accuracy tracked and misses shrinking; receivables under management with five groups, one owner each and a decision executed on both 90 plus day disputes; Scorecard v2 with eight numbers, each with one definition, one source, one owner. Explicitly not in 90 days: no new ERP or systems because the problem is definitions and ownership, not software; no real time everything because weekly and trusted beats real time and disputed; no fixed price at 40% of revenue yet because the readiness gate comes first; no hiring before the diagnosis, so by day 90 the FP and A question is answered with evidence, not instinct. I cannot promise a client pays. I can promise the decision about that client is made and executed." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-09.png" alt="What I commit to, and what I refuse to promise" style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
  <div data-document-role="page" data-label="I am not asking for budget. I am asking for decision rights." data-speaker-notes="Bookend the opening and slow down on the last sentence; it is the close of the whole argument. The three decision rights: one, the CEO joins the weekly Cash Council for the first eight weeks, because decisions get made where the cash picture is. Two, a mandate on the two 90 plus day disputes, authority to settle or escalate including a commercial haircut for speed. Three, delivery owns utilisation jointly with finance, because a number only finance believes is a number nobody uses. Give me those three and by day 90 confidence stops being a word on a slide." style="width:1920px;height:1080px;position:relative;overflow:hidden;background:#161917;">
    <img src="https://raw.githubusercontent.com/dannythehat/Presentation-/refs/heads/claude/limechain-cfo-board-deck-1coexa/final_deck/design/slides/slide-10.png" alt="I am not asking for budget. I am asking for decision rights." style="position:absolute;inset:0;width:1920px;height:1080px;display:block;" />
  </div>
